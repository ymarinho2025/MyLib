<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca de Yuri Marinho</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="profile-card">
      <div class="avatar">📚</div>
      <div>
        <h1>Biblioteca de Yuri Marinho</h1>
        <p>Meus livros lidos, em leitura e desejados</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="stats">
      <div><strong id="totalBooks">0</strong><span>Total</span></div>
      <div><strong id="readBooks">0</strong><span>Lidos</span></div>
      <div><strong id="readingBooks">0</strong><span>Lendo</span></div>
      <div><strong id="wantBooks">0</strong><span>Quero ler</span></div>
    </section>

    <section class="controls">
      <input type="text" id="searchInput" placeholder="Buscar por livro ou categoria..." />

      <select id="categoryFilter">
        <option value="todos">Todas as categorias</option>
      </select>

      <select id="statusFilter">
        <option value="todos">Todos</option>
        <option value="lido">Lido</option>
        <option value="lendo">Lendo</option>
        <option value="quero_ler">Quero ler</option>
      </select>
    </section>

    <section id="booksContainer" class="books-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
